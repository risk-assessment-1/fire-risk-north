<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>

  <!-- Building silhouette -->
  <g fill="#334155" opacity="0.3">
    <rect x="100" y="350" width="80" height="280"/>
    <rect x="200" y="300" width="100" height="330"/>
    <rect x="320" y="250" width="90" height="380"/>
    <rect x="440" y="200" width="110" height="430"/>
    <rect x="580" y="280" width="85" height="350"/>
    <rect x="690" y="320" width="95" height="310"/>
    <rect x="810" y="270" width="100" height="360"/>
    <rect x="940" y="350" width="80" height="280"/>
    <rect x="1050" y="400" width="70" height="230"/>
  </g>

  <!-- Windows with lights -->
  <g fill="#fef3c7" opacity="0.6">
    <!-- Random lit windows -->
    <rect x="210" y="320" width="12" height="15"/>
    <rect x="240" y="350" width="12" height="15"/>
    <rect x="330" y="270" width="12" height="15"/>
    <rect x="360" y="300" width="12" height="15"/>
    <rect x="380" y="350" width="12" height="15"/>
    <rect x="460" y="220" width="15" height="18"/>
    <rect x="500" y="250" width="15" height="18"/>
    <rect x="490" y="320" width="15" height="18"/>
    <rect x="510" y="380" width="15" height="18"/>
    <rect x="600" y="300" width="12" height="15"/>
    <rect x="630" y="340" width="12" height="15"/>
    <rect x="710" y="350" width="12" height="15"/>
    <rect x="750" y="390" width="12" height="15"/>
    <rect x="830" y="300" width="15" height="18"/>
    <rect x="860" y="340" width="15" height="18"/>
    <rect x="850" y="400" width="15" height="18"/>
  </g>

  <!-- Deadline badge -->
  <g transform="translate(50, 50)">
    <rect width="200" height="60" rx="8" fill="#ef4444"/>
    <text x="100" y="40" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">6 April 2026</text>
  </g>

  <!-- Main text -->
  <text x="600" y="150" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="52" font-weight="bold">Residential Evacuation Plans</text>

  <text x="600" y="220" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="32">The April 2026 Deadline:</text>
  <text x="600" y="270" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="32">Preparing Your Portfolio for</text>
  <text x="600" y="320" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="32">Mandatory PEEPs</text>

  <!-- Key stat -->
  <g transform="translate(350, 520)">
    <rect width="500" height="70" rx="12" fill="url(#accent-gradient)" opacity="0.9"/>
    <text x="250" y="30" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">~12,500 buildings affected in England</text>
    <text x="250" y="55" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif" font-size="16">Are you ready for the new regulations?</text>
  </g>
</svg>